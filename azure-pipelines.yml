trigger:
- main

pool: hitesh_pool_yaml 

stages:
# --- 1. DEV STAGE ---
- stage: Deploy_DEV
  displayName: 'Deploy to DEV'
  jobs:
  - deployment: Terraform_Dev
    environment: 'Dev' # Azure DevOps portal wala Environment
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          # NAYA TASK: Pehle Init karenge
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init Dev'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/dev'
              backendServiceArm: 'hitesh_yaml_service_connection_1'
              backendAzureRmResourceGroupName: 'rgworkload'
              backendAzureRmStorageAccountName: 'storageworkload1'
              backendAzureRmContainerName: 'containerworkload'
              backendAzureRmKey: 'dev.terraform.tfstate'

          # PHIR: Apply karenge
          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply Dev'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/dev'
              environmentServiceNameAzureRM: 'hitesh_yaml_service_connection_1'

# --- 2. QA STAGE ---
- stage: Deploy_QA
  displayName: 'Deploy to QA'
  dependsOn: Deploy_DEV
  jobs:
  - deployment: Terraform_QA
    environment: 'QA' # Azure DevOps portal wala Environment
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          # NAYA TASK: QA ke liye Init
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init QA'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/qa'
              backendServiceArm: 'hitesh_yaml_service_connection_1'
              backendAzureRmResourceGroupName: 'rgworkload'
              backendAzureRmStorageAccountName: 'storageworkload1'
              backendAzureRmContainerName: 'containerworkload'
              backendAzureRmKey: 'qa.terraform.tfstate'

          # PHIR: QA ke liye Apply
          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply QA'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/qa'
              environmentServiceNameAzureRM: 'hitesh_yaml_service_connection_1'

# --- 3. PROD STAGE (THE BOSS STAGE) ---
- stage: Deploy_PROD
  displayName: 'Deploy to PROD'
  dependsOn: Deploy_QA
  jobs:
  - deployment: Terraform_Prod
    environment: 'Prod' # Yahan aakar pipeline rukkegi aur Approval mangegi!
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          # NAYA TASK: Prod ke liye Init
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init Prod'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/prod'
              backendServiceArm: 'hitesh_yaml_service_connection_1'
              backendAzureRmResourceGroupName: 'rgworkload'
              backendAzureRmStorageAccountName: 'storageworkload1'
              backendAzureRmContainerName: 'containerworkload'
              backendAzureRmKey: 'prod.terraform.tfstate'

          # PHIR: Prod ke liye Apply
          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply Prod'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/prod'
              environmentServiceNameAzureRM: 'hitesh_yaml_service_connection_1'